services:
  openserp:
    image: karust/openserp:latest
    command: serve -p 7000
    expose:
      - "7000"
    environment:
      - ENGINE=yandex
    restart: unless-stopped

  malder:
    build: .
    ports:
      - "8080:8080"
    environment:
      - LLM_ENDPOINT=${LLM_ENDPOINT:-https://api.modelgate.ru/v1}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-deepseek-v4-flash}
      - LLM_MODEL_COORDINATOR=${LLM_MODEL_COORDINATOR:-}
      - LLM_MODEL_ANALYST=${LLM_MODEL_ANALYST:-}
      - LLM_MODEL_CRITIC=${LLM_MODEL_CRITIC:-}
      - LLM_TEMPERATURE=0.7
      - LLM_TIMEOUT=60s
      - OPENSERP_URL=http://openserp:7000
      - MEMORY_PATH=/data
      - MALDER_LOG_LEVEL=${MALDER_LOG_LEVEL:-warn}
      - MALDER_DEBUG_FILE=${MALDER_DEBUG_FILE:-/data/malder_debug.log}
      - MAX_CONCURRENT_SEARCH=3
      - MAX_PAGES_PER_QUERY=3
      - MAX_ITERATIONS=3
      - SERVER_PORT=8080
    volumes:
      - ./data:/data
    depends_on:
      - openserp
    restart: unless-stopped
