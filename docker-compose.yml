version: '3.8'

services:
  openserp:
    image: openserp/openserp:latest
    ports:
      - "8081:8080"
    environment:
      - ENGINE=yandex
    restart: unless-stopped

  malder:
    build: .
    ports:
      - "8080:8080"
    environment:
      - LLM_ENDPOINT=${LLM_ENDPOINT:-http://host.docker.internal:11434/v1}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-llama3.2}
      - LLM_TEMPERATURE=0.7
      - LLM_TIMEOUT=60s
      - OPENSERP_URL=http://openserp:8080
      - MEMORY_PATH=/data
      - MAX_CONCURRENT_SEARCH=3
      - MAX_PAGES_PER_QUERY=3
      - MAX_ITERATIONS=3
      - SERVER_PORT=8080
    volumes:
      - ./data:/data
    depends_on:
      - openserp
    restart: unless-stopped
